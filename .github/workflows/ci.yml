name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build & test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]
        include:
          # Extra forward-compat check on Linux only.
          - os: ubuntu-latest
            node: 22
    steps:
      - uses: actions/checkout@v4

      # pnpm 10 supports Node 18+ (pnpm 11 requires Node >=22.13 via node:sqlite,
      # which would break the Node 20 matrix leg).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Build first: it emits each package's dist/*.d.ts and typechecks src via
      # tsc, so it doubles as the type gate. Dependent packages can only resolve
      # @ace/* types once their deps are built.
      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
