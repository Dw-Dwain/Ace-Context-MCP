packages:
  - 'packages/*'
  - 'apps/*'
# Approve packages whose install scripts we allow to run (all ship prebuilt
# binaries, so this is belt-and-suspenders). onnxruntime/sharp only apply when
# the optional semantic embedder (@huggingface/transformers) is installed.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - onnxruntime-node
  - protobufjs
  - sharp
