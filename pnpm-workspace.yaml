packages:
  - 'packages/*'
  - 'apps/*'
# Valid pnpm key for approving package build scripts. better-sqlite3 and esbuild
# ship prebuilt binaries so this is belt-and-suspenders; onnxruntime/sharp only
# apply when the optional semantic embedder (@huggingface/transformers) is added.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - onnxruntime-node
  - protobufjs
  - sharp
